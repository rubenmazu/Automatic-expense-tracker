<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cheltuieli" />
  <meta name="theme-color" content="#0f0f14" />
  <title>Cheltuieli</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f14; --bg2: #16161f; --bg3: #1e1e2a; --bg4: #252535;
      --border: #2a2a3d; --text: #f0eff8; --text2: #9896b8; --text3: #5f5e7a;
      --accent: #7c6aff; --accent2: #a594ff; --accent-glow: rgba(124,106,255,0.15);
      --green: #4ade80; --red: #f87171; --yellow: #fbbf24; --orange: #fb923c;
      --pink: #f472b6; --cyan: #22d3ee; --teal: #2dd4bf;
      --radius: 16px; --radius-sm: 10px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
    #root { height: 100%; display: flex; flex-direction: column; }
    ::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    input, textarea, button { font-family: 'DM Sans', sans-serif; }
    input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
    @keyframes popIn { from { opacity:0; transform:scale(0.94); } to { opacity:1; transform:scale(1); } }
    .fu { animation: fadeUp 0.35s ease both; }
    .fu1 { animation-delay:0.04s; } .fu2 { animation-delay:0.08s; }
    .fu3 { animation-delay:0.12s; } .fu4 { animation-delay:0.16s; } .fu5 { animation-delay:0.2s; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>
<script>
'use strict';
const e = React.createElement;
const { useState, useEffect, useMemo, useCallback } = React;
const {
  AreaChart, Area, BarChart, Bar, PieChart, Pie, Cell,
  XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend
} = Recharts;

// ── DATA ──────────────────────────────────────────────────────────────────
const PARSERS = {
  revolut: { name:'Revolut', color:'#7c6aff',
    amtRx:[/(?:platit|plătit|payment|paid|spent)[^\d]*([0-9]+[.,]?[0-9]*)\s*(?:RON|lei|EUR|USD)/i, /([0-9]+[.,][0-9]+)\s*(?:RON|lei)/i, /([0-9]+)\s*(?:RON|lei)/i],
    mchRx:[/(?:la|at|to|@)\s+([A-Za-z][^\n•,]{2,30})/i, /\*\s*([A-Za-z][^\n•,*]{2,25})/i] },
  brd: { name:'BRD', color:'#22d3ee',
    amtRx:[/([0-9]+[.,]?[0-9]*)\s*(?:RON|lei)/i, /suma[:\s]+([0-9]+[.,]?[0-9]*)/i],
    mchRx:[/(?:comerciant|merchant|la|POS)[:\s]+([A-Za-z][^\n•,]{2,30})/i] },
  edenred: { name:'Edenred', color:'#f59e0b',
    amtRx:[/([0-9]+[.,]?[0-9]*)\s*(?:RON|lei)/i],
    mchRx:[/(?:la|utilizat la|at)\s+([A-Za-z][^\n•,]{2,30})/i] },
};

const CATS = {
  'Restaurant':   { icon:'🍽️', color:'#f472b6' },
  'Cafenea':      { icon:'☕',  color:'#fb923c' },
  'Supermarket':  { icon:'🛒',  color:'#4ade80' },
  'Transport':    { icon:'🚗',  color:'#22d3ee' },
  'Combustibil':  { icon:'⛽',  color:'#fbbf24' },
  'Farmacie':     { icon:'💊',  color:'#f87171' },
  'Divertisment': { icon:'🎬',  color:'#a78bfa' },
  'Îmbrăcăminte': { icon:'👕',  color:'#34d399' },
  'Utilități':    { icon:'🏠',  color:'#60a5fa' },
  'Sport':        { icon:'💪',  color:'#4ade80' },
  'Altele':       { icon:'📦',  color:'#9896b8' },
};

const MCH_CATS = {
  'mega image':'Supermarket','kaufland':'Supermarket','lidl':'Supermarket',
  'carrefour':'Supermarket','auchan':'Supermarket','profi':'Supermarket',
  'penny':'Supermarket','selgros':'Supermarket',
  'starbucks':'Cafenea','coffee':'Cafenea','cafe':'Cafenea','costa':'Cafenea',
  'mcdonald':'Restaurant','kfc':'Restaurant','subway':'Restaurant',
  'pizza':'Restaurant','restaurant':'Restaurant','sushi':'Restaurant',
  'burger':'Restaurant','grill':'Restaurant','shawarma':'Restaurant',
  'rompetrol':'Combustibil','mol':'Combustibil','omv':'Combustibil',
  'petrom':'Combustibil','lukoil':'Combustibil',
  'uber':'Transport','bolt':'Transport','taxi':'Transport','ratb':'Transport',
  'farmacia':'Farmacie','catena':'Farmacie','sensiblu':'Farmacie','dona':'Farmacie',
  'cinema':'Divertisment','netflix':'Divertisment','spotify':'Divertisment',
  'decathlon':'Sport','intersport':'Sport',
  'zara':'Îmbrăcăminte','h&m':'Îmbrăcăminte','reserved':'Îmbrăcăminte',
};

function detectCat(merchant) {
  if (!merchant) return 'Altele';
  const m = merchant.toLowerCase();
  for (const [k,v] of Object.entries(MCH_CATS)) if (m.includes(k)) return v;
  return 'Altele';
}

function parseNotif(text, src) {
  const p = PARSERS[src]; if (!p) return null;
  let amount = null;
  for (const rx of p.amtRx) { const m = text.match(rx); if (m) { amount = parseFloat(m[1].replace(',','.')); break; } }
  if (!amount || amount <= 0) return null;
  let merchant = 'Necunoscut';
  for (const rx of p.mchRx) { const m = text.match(rx); if (m && m[1]) { merchant = m[1].trim(); break; } }
  const category = detectCat(merchant);
  return { amount, merchant, category, source:src, sourceName:p.name, sourceColor:p.color };
}

// ── STORAGE ───────────────────────────────────────────────────────────────
const SK = 'cheltuieli_v2';
function load() {
  try { const r = localStorage.getItem(SK); if (r) return JSON.parse(r); } catch {}
  return { transactions:[], settings:{ supabaseUrl:'', supabaseKey:'', useSupabase:false } };
}
function save(d) { try { localStorage.setItem(SK, JSON.stringify(d)); } catch {} }

// ── HELPERS ───────────────────────────────────────────────────────────────
const fmt = n => n.toLocaleString('ro-RO', { minimumFractionDigits:2, maximumFractionDigits:2 });
const fmtDate = iso => new Date(iso).toLocaleDateString('ro-RO', { day:'numeric', month:'short' });
const MO = ['Ian','Feb','Mar','Apr','Mai','Iun','Iul','Aug','Sep','Oct','Nov','Dec'];
function groupBy(arr, key) {
  return arr.reduce((a,i) => { (a[i[key]] = a[i[key]]||[]).push(i); return a; }, {});
}

// ── STYLE HELPERS ─────────────────────────────────────────────────────────
const card = (extra={}) => ({ background:'var(--bg2)', border:'1px solid var(--border)', borderRadius:'var(--radius)', padding:18, ...extra });
const btn = (active, color='var(--accent)', bg='var(--accent-glow)') => ({
  padding:'7px 14px', borderRadius:20, border:'1px solid', cursor:'pointer',
  borderColor: active ? color : 'var(--border)',
  background: active ? bg : 'transparent',
  color: active ? color : 'var(--text3)',
  fontSize:13, fontWeight:500, whiteSpace:'nowrap',
});

// ── TOOLTIP ───────────────────────────────────────────────────────────────
function CTip({ active, payload, label }) {
  if (!active || !payload?.length) return null;
  return e('div', { style:{ background:'var(--bg3)', border:'1px solid var(--border)', borderRadius:10, padding:'10px 14px', fontSize:13 } },
    label && e('p', { style:{ color:'var(--text2)', marginBottom:6 } }, label),
    ...payload.map((p,i) => e('p', { key:i, style:{ color: p.color||'var(--text)' } }, p.name, ': ', e('strong',null, fmt(p.value), ' RON')))
  );
}

// ── NAVBAR ────────────────────────────────────────────────────────────────
function Navbar({ page, setPage }) {
  const items = [
    { id:'dashboard', icon:'⬡', label:'Acasă' },
    { id:'transactions', icon:'☰', label:'Tranzacții' },
    { id:'charts', icon:'◉', label:'Grafice' },
    { id:'settings', icon:'⚙', label:'Setări' },
  ];
  return e('nav', {
    style:{ display:'flex', justifyContent:'space-around', alignItems:'center',
      padding:'8px 0 max(8px, env(safe-area-inset-bottom))',
      background:'rgba(15,15,20,0.97)', backdropFilter:'blur(20px)',
      borderTop:'1px solid var(--border)', flexShrink:0 }
  }, ...items.map(item =>
    e('button', {
      key: item.id,
      onClick: () => setPage(item.id),
      style:{ display:'flex', flexDirection:'column', alignItems:'center', gap:3,
        background:'none', border:'none', cursor:'pointer',
        color: page===item.id ? 'var(--accent2)' : 'var(--text3)',
        padding:'4px 16px', fontSize:11, fontWeight:500, transition:'color 0.2s' }
    },
      e('span', { style:{ fontSize:22, lineHeight:1, filter: page===item.id ? 'drop-shadow(0 0 8px var(--accent))' : 'none', transition:'filter 0.2s' } }, item.icon),
      item.label
    )
  ));
}

// ── TOAST ─────────────────────────────────────────────────────────────────
function Toast({ message, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const color = type==='error' ? '#f87171' : '#4ade80';
  return e('div', { style:{
    position:'fixed', bottom:90, left:'50%', transform:'translateX(-50%)',
    background: color+'1a', border:`1px solid ${color}44`, color,
    padding:'10px 20px', borderRadius:12, fontSize:14, fontWeight:500,
    zIndex:999, animation:'popIn 0.2s ease', backdropFilter:'blur(20px)', whiteSpace:'nowrap'
  } }, (type==='error'?'✕ ':'✓ ') + message);
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────
function Dashboard({ txs, onAdd }) {
  const now = new Date();
  const thisM = txs.filter(t => { const d=new Date(t.date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); });
  const lastM = txs.filter(t => { const d=new Date(t.date); const lm=new Date(now.getFullYear(),now.getMonth()-1,1); return d.getMonth()===lm.getMonth()&&d.getFullYear()===lm.getFullYear(); });
  const totalNow = thisM.reduce((s,t)=>s+t.amount,0);
  const totalLast = lastM.reduce((s,t)=>s+t.amount,0);
  const diff = totalLast>0 ? ((totalNow-totalLast)/totalLast*100).toFixed(1) : null;

  const catData = Object.entries(groupBy(thisM,'category'))
    .map(([cat,ts]) => ({ cat, total:ts.reduce((s,t)=>s+t.amount,0), ...CATS[cat]||CATS['Altele'] }))
    .sort((a,b)=>b.total-a.total).slice(0,5);

  const last7 = [];
  for (let i=6;i>=0;i--) {
    const d=new Date(); d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    last7.push({ zi:['D','L','Ma','Mi','J','V','S'][d.getDay()], total:txs.filter(t=>t.date.slice(0,10)===ds).reduce((s,t)=>s+t.amount,0) });
  }

  const bySrc = Object.entries(groupBy(thisM,'sourceName')).map(([name,ts]) => ({ name, total:ts.reduce((s,t)=>s+t.amount,0), color:PARSERS[ts[0]?.source]?.color||'#9896b8' }));
  const recent = [...txs].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,4);

  return e('div', { style:{ flex:1, overflowY:'auto', padding:'16px 16px 8px', WebkitOverflowScrolling:'touch' } },

    // Header
    e('div', { className:'fu', style:{ marginBottom:20 } },
      e('p', { style:{ color:'var(--text3)', fontSize:13, marginBottom:4 } }, now.toLocaleDateString('ro-RO',{month:'long',year:'numeric'})),
      e('div', { style:{ display:'flex', alignItems:'baseline', gap:8 } },
        e('span', { style:{ fontFamily:'DM Serif Display, serif', fontSize:42, fontWeight:400, lineHeight:1.1 } }, fmt(totalNow)),
        e('span', { style:{ fontSize:20, color:'var(--text2)' } }, 'RON')
      ),
      diff !== null && e('p', { style:{ color:parseFloat(diff)>0?'var(--red)':'var(--green)', fontSize:13, marginTop:6 } },
        (parseFloat(diff)>0?'▲ ':'▼ ') + Math.abs(diff) + '% față de luna trecută'
      )
    ),

    // Add button
    e('button', { className:'fu fu1', onClick:onAdd, style:{
      width:'100%', padding:14, background:'var(--accent-glow)',
      border:'1px dashed var(--accent)', borderRadius:'var(--radius)',
      color:'var(--accent2)', fontSize:15, fontWeight:500, cursor:'pointer', marginBottom:16
    } }, '+ Adaugă tranzacție'),

    // 7-day chart
    last7.some(d=>d.total>0) && e('div', { className:'fu fu2', style:card({ marginBottom:16 }) },
      e('p', { style:{ fontSize:12, color:'var(--text3)', marginBottom:14, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.06em' } }, 'Ultimele 7 zile'),
      e(ResponsiveContainer, { width:'100%', height:110 },
        e(AreaChart, { data:last7 },
          e('defs', null, e('linearGradient', { id:'g1', x1:0, y1:0, x2:0, y2:1 },
            e('stop', { offset:'5%', stopColor:'#7c6aff', stopOpacity:0.35 }),
            e('stop', { offset:'95%', stopColor:'#7c6aff', stopOpacity:0 })
          )),
          e(XAxis, { dataKey:'zi', tick:{ fill:'var(--text3)', fontSize:11 }, axisLine:false, tickLine:false }),
          e(Tooltip, { content: e(CTip) }),
          e(Area, { type:'monotone', dataKey:'total', stroke:'#7c6aff', strokeWidth:2, fill:'url(#g1)' })
        )
      )
    ),

    // Categories
    catData.length>0 && e('div', { className:'fu fu3', style:card({ marginBottom:16 }) },
      e('p', { style:{ fontSize:12, color:'var(--text3)', marginBottom:14, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.06em' } }, 'Top categorii — luna aceasta'),
      ...catData.map((c,i) => e('div', { key:c.cat, style:{ display:'flex', alignItems:'center', gap:12, marginBottom:i<catData.length-1?14:0 } },
        e('span', { style:{ fontSize:20 } }, c.icon),
        e('div', { style:{ flex:1 } },
          e('div', { style:{ display:'flex', justifyContent:'space-between', marginBottom:5 } },
            e('span', { style:{ fontSize:14, fontWeight:500 } }, c.cat),
            e('span', { style:{ fontSize:14, color:'var(--text2)' } }, fmt(c.total) + ' RON')
          ),
          e('div', { style:{ height:4, background:'var(--bg4)', borderRadius:2, overflow:'hidden' } },
            e('div', { style:{ height:'100%', width:(c.total/catData[0].total*100).toFixed(0)+'%', background:c.color, borderRadius:2, transition:'width 0.5s ease' } })
          )
        )
      ))
    ),

    // By source
    bySrc.length>0 && e('div', { className:'fu fu4', style:card({ marginBottom:16 }) },
      e('p', { style:{ fontSize:12, color:'var(--text3)', marginBottom:14, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.06em' } }, 'Pe sursă'),
      e('div', { style:{ display:'flex', gap:10 } },
        ...bySrc.map(s => e('div', { key:s.name, style:{ flex:1, padding:12, background:s.color+'11', border:`1px solid ${s.color}33`, borderRadius:12, textAlign:'center' } },
          e('p', { style:{ fontSize:18, fontWeight:600, color:s.color } }, fmt(s.total)),
          e('p', { style:{ fontSize:11, color:'var(--text3)', marginTop:2 } }, 'RON'),
          e('p', { style:{ fontSize:12, color:'var(--text2)', marginTop:6, fontWeight:500 } }, s.name)
        ))
      )
    ),

    // Recent
    recent.length>0 && e('div', { className:'fu fu5', style:card({ marginBottom:8 }) },
      e('p', { style:{ fontSize:12, color:'var(--text3)', marginBottom:14, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.06em' } }, 'Recente'),
      ...recent.map((t,i) => {
        const cat = CATS[t.category]||CATS['Altele'];
        return e('div', { key:t.id, style:{ display:'flex', alignItems:'center', gap:12, marginBottom:i<recent.length-1?14:0 } },
          e('div', { style:{ width:38, height:38, borderRadius:10, background:cat.color+'22', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, flexShrink:0 } }, cat.icon),
          e('div', { style:{ flex:1, minWidth:0 } },
            e('p', { style:{ fontSize:14, fontWeight:500, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' } }, t.merchant),
            e('p', { style:{ fontSize:12, color:'var(--text3)', marginTop:2 } }, fmtDate(t.date))
          ),
          e('p', { style:{ fontSize:15, fontWeight:600, flexShrink:0 } }, '-' + fmt(t.amount) + ' RON')
        );
      })
    ),

    txs.length===0 && e('div', { style:{ textAlign:'center', padding:'60px 20px', color:'var(--text3)' } },
      e('p', { style:{ fontSize:44, marginBottom:16 } }, '◈'),
      e('p', { style:{ fontSize:20, fontFamily:'DM Serif Display, serif', color:'var(--text2)', marginBottom:8 } }, 'Nicio tranzacție'),
      e('p', { style:{ fontSize:14, lineHeight:1.6 } }, 'Apasă butonul de sus pentru a adăuga prima tranzacție')
    )
  );
}

// ── TRANSACTIONS ──────────────────────────────────────────────────────────
function Transactions({ txs, onDelete }) {
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [period, setPeriod] = useState('month');
  const now = new Date();

  const filtered = txs.filter(t => {
    const d = new Date(t.date);
    if (period==='week') { const w=new Date(); w.setDate(w.getDate()-7); if(d<w) return false; }
    if (period==='month') { if(d.getMonth()!==now.getMonth()||d.getFullYear()!==now.getFullYear()) return false; }
    if (period==='3m') { const x=new Date(); x.setMonth(x.getMonth()-3); if(d<x) return false; }
    if (filter!=='all' && t.category!==filter) return false;
    if (search && !t.merchant.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  }).sort((a,b)=>new Date(b.date)-new Date(a.date));

  const total = filtered.reduce((s,t)=>s+t.amount,0);

  return e('div', { style:{ flex:1, overflowY:'auto', padding:'16px 16px 8px', WebkitOverflowScrolling:'touch' } },
    e('h2', { className:'fu', style:{ fontFamily:'DM Serif Display, serif', fontSize:28, fontWeight:400, marginBottom:16 } }, 'Tranzacții'),

    // Search
    e('div', { className:'fu fu1', style:{ position:'relative', marginBottom:12 } },
      e('input', { value:search, onChange:ev=>setSearch(ev.target.value), placeholder:'Caută comerciant...',
        style:{ width:'100%', padding:'12px 12px 12px 16px', background:'var(--bg2)', border:'1px solid var(--border)', borderRadius:12, color:'var(--text)', fontSize:15, outline:'none' } })
    ),

    // Period
    e('div', { className:'fu fu2', style:{ display:'flex', gap:8, marginBottom:12, overflowX:'auto', paddingBottom:4 } },
      ...[['week','7 zile'],['month','Luna aceasta'],['3m','3 luni'],['all','Toate']].map(([v,l]) =>
        e('button', { key:v, onClick:()=>setPeriod(v), style:btn(period===v) }, l)
      )
    ),

    // Category filter
    e('div', { className:'fu fu3', style:{ display:'flex', gap:8, marginBottom:16, overflowX:'auto', paddingBottom:4 } },
      e('button', { onClick:()=>setFilter('all'), style:btn(filter==='all') }, 'Toate'),
      ...Object.entries(CATS).map(([cat,{icon,color}]) =>
        e('button', { key:cat, onClick:()=>setFilter(cat), style:btn(filter===cat, color, color+'22') }, icon+' '+cat)
      )
    ),

    // Summary
    filtered.length>0 && e('div', { className:'fu fu4', style:{ display:'flex', justifyContent:'space-between', marginBottom:16, padding:'12px 16px', background:'var(--bg2)', border:'1px solid var(--border)', borderRadius:12 } },
      e('span', { style:{ color:'var(--text3)', fontSize:14 } }, filtered.length + ' tranzacții'),
      e('span', { style:{ fontWeight:600, fontSize:14 } }, fmt(total) + ' RON')
    ),

    // List
    ...filtered.map((t,i) => {
      const cat = CATS[t.category]||CATS['Altele'];
      return e('div', { key:t.id, style:{ display:'flex', alignItems:'center', gap:12, marginBottom:10, padding:'14px', background:'var(--bg2)', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', animation:`fadeUp 0.3s ${i*0.02}s ease both` } },
        e('div', { style:{ width:40, height:40, borderRadius:11, background:cat.color+'22', display:'flex', alignItems:'center', justifyContent:'center', fontSize:19, flexShrink:0 } }, cat.icon),
        e('div', { style:{ flex:1, minWidth:0 } },
          e('p', { style:{ fontSize:14, fontWeight:500, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' } }, t.merchant),
          e('div', { style:{ display:'flex', gap:6, marginTop:4, alignItems:'center' } },
            e('span', { style:{ fontSize:11, color:'var(--text3)' } }, fmtDate(t.date)),
            e('span', { style:{ fontSize:11, color:t.sourceColor||'#9896b8', background:(t.sourceColor||'#9896b8')+'18', padding:'1px 6px', borderRadius:4 } }, t.sourceName)
          )
        ),
        e('div', { style:{ textAlign:'right', flexShrink:0 } },
          e('p', { style:{ fontSize:15, fontWeight:600 } }, '-' + fmt(t.amount)),
          e('p', { style:{ fontSize:11, color:'var(--text3)' } }, 'RON')
        ),
        e('button', { onClick:()=>onDelete(t.id), style:{ background:'none', border:'none', cursor:'pointer', color:'var(--text3)', fontSize:20, padding:'4px', flexShrink:0, lineHeight:1 } }, '×')
      );
    }),

    filtered.length===0 && e('div', { style:{ textAlign:'center', padding:40, color:'var(--text3)', fontSize:14 } }, 'Nicio tranzacție găsită')
  );
}

// ── CHARTS ────────────────────────────────────────────────────────────────
function Charts({ txs }) {
  const [active, setActive] = useState('pie');
  const now = new Date();

  const thisM = txs.filter(t => { const d=new Date(t.date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); });

  const monthlyData = useMemo(() => {
    const months = {};
    for (let i=5;i>=0;i--) { const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-i); const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; months[k]={ month:MO[d.getMonth()], total:0, revolut:0, brd:0, edenred:0 }; }
    txs.forEach(t => { const k=t.date.slice(0,7); if(months[k]) { months[k].total+=t.amount; if(months[k][t.source]!==undefined) months[k][t.source]+=t.amount; } });
    return Object.values(months);
  }, [txs]);

  const catPie = useMemo(() => Object.entries(groupBy(thisM,'category')).map(([cat,ts]) => ({ name:(CATS[cat]?.icon||'📦')+' '+cat, value:ts.reduce((s,t)=>s+t.amount,0), color:CATS[cat]?.color||'#9896b8' })).sort((a,b)=>b.value-a.value), [txs]);
  const topMch = useMemo(() => Object.entries(groupBy(txs,'merchant')).map(([name,ts]) => ({ name, total:ts.reduce((s,t)=>s+t.amount,0) })).sort((a,b)=>b.total-a.total).slice(0,7), [txs]);
  const avgDaily = thisM.reduce((s,t)=>s+t.amount,0) / Math.max(now.getDate(),1);

  const chartBtns = [['pie','🥧 Categorii'],['monthly','📊 Lunar'],['sources','💳 Surse'],['merchants','🏪 Comercianți']];

  return e('div', { style:{ flex:1, overflowY:'auto', padding:'16px 16px 8px', WebkitOverflowScrolling:'touch' } },
    e('h2', { className:'fu', style:{ fontFamily:'DM Serif Display, serif', fontSize:28, fontWeight:400, marginBottom:16 } }, 'Grafice'),

    // Stats grid
    e('div', { className:'fu fu1', style:{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:16 } },
      ...[
        ['Luna aceasta', fmt(thisM.reduce((s,t)=>s+t.amount,0)), 'RON', 'var(--accent2)'],
        ['Medie zilnică', fmt(avgDaily), 'RON/zi', 'var(--teal)'],
        ['Tranzacții total', txs.length, 'toate timpurile', 'var(--text)'],
        ['Total general', fmt(txs.reduce((s,t)=>s+t.amount,0)), 'RON', 'var(--yellow)'],
      ].map(([label, val, sub, color]) =>
        e('div', { key:label, style:card({ padding:14 }) },
          e('p', { style:{ fontSize:11, color:'var(--text3)', textTransform:'uppercase', letterSpacing:'0.05em' } }, label),
          e('p', { style:{ fontSize:22, fontWeight:600, marginTop:4, color } }, val),
          e('p', { style:{ fontSize:11, color:'var(--text3)' } }, sub)
        )
      )
    ),

    // Chart selector
    e('div', { className:'fu fu2', style:{ display:'flex', gap:8, marginBottom:16, overflowX:'auto', paddingBottom:4 } },
      ...chartBtns.map(([id,label]) => e('button', { key:id, onClick:()=>setActive(id), style:btn(active===id) }, label))
    ),

    // Pie
    active==='pie' && e('div', { className:'fu', style:card({ marginBottom:8 }) },
      e('p', { style:{ fontSize:12, color:'var(--text3)', marginBottom:16, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.06em' } }, 'Categorii luna aceasta'),
      catPie.length>0 ? e('div', null,
        e(ResponsiveContainer, { width:'100%', height:200 },
          e(PieChart, null,
            e(Pie, { data:catPie, cx:'50%', cy:'50%', outerRadius:85, innerRadius:45, dataKey:'value', paddingAngle:3 },
              ...catPie.map((c,i) => e(Cell, { key:i, fill:c.color }))
            ),
            e(Tooltip, { content: e(CTip) })
          )
        ),
        e('div', { style:{ display:'flex', flexDirection:'column', gap:8, marginTop:14 } },
          ...catPie.map((c,i) => e('div', { key:i, style:{ display:'flex', alignItems:'center', gap:10 } },
            e('div', { style:{ width:10, height:10, borderRadius:3, background:c.color, flexShrink:0 } }),
            e('span', { style:{ flex:1, fontSize:14 } }, c.name),
            e('span', { style:{ fontSize:14, fontWeight:500 } }, fmt(c.value)+' RON')
          ))
        )
      ) : e('p', { style:{ color:'var(--text3)', textAlign:'center', padding:30 } }, 'Nicio dată')
    ),

    // Monthly
    active==='monthly' && e('div', { className:'fu', style:card({ marginBottom:8 }) },
      e('p', { style:{ fontSize:12, color:'var(--text3)', marginBottom:16, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.06em' } }, 'Evoluție lunară'),
      e(ResponsiveContainer, { width:'100%', height:210 },
        e(BarChart, { data:monthlyData },
          e('defs', null, e('linearGradient', { id:'bg1', x1:0, y1:0, x2:0, y2:1 },
            e('stop', { offset:'5%', stopColor:'#7c6aff', stopOpacity:0.9 }),
            e('stop', { offset:'95%', stopColor:'#7c6aff', stopOpacity:0.4 })
          )),
          e(CartesianGrid, { strokeDasharray:'3 3', stroke:'var(--border)' }),
          e(XAxis, { dataKey:'month', tick:{ fill:'var(--text3)', fontSize:12 }, axisLine:false, tickLine:false }),
          e(YAxis, { tick:{ fill:'var(--text3)', fontSize:10 }, axisLine:false, tickLine:false }),
          e(Tooltip, { content: e(CTip) }),
          e(Bar, { dataKey:'total', name:'Total', fill:'url(#bg1)', radius:[6,6,0,0] })
        )
      )
    ),

    // Sources stacked
    active==='sources' && e('div', { className:'fu', style:card({ marginBottom:8 }) },
      e('p', { style:{ fontSize:12, color:'var(--text3)', marginBottom:16, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.06em' } }, 'Pe sursă — 6 luni'),
      e(ResponsiveContainer, { width:'100%', height:210 },
        e(BarChart, { data:monthlyData },
          e(CartesianGrid, { strokeDasharray:'3 3', stroke:'var(--border)' }),
          e(XAxis, { dataKey:'month', tick:{ fill:'var(--text3)', fontSize:12 }, axisLine:false, tickLine:false }),
          e(YAxis, { tick:{ fill:'var(--text3)', fontSize:10 }, axisLine:false, tickLine:false }),
          e(Tooltip, { content: e(CTip) }),
          e(Legend, { wrapperStyle:{ fontSize:12, color:'var(--text2)' } }),
          e(Bar, { dataKey:'revolut', name:'Revolut', fill:'#7c6aff', radius:[3,3,0,0], stackId:'a' }),
          e(Bar, { dataKey:'brd', name:'BRD', fill:'#22d3ee', radius:[3,3,0,0], stackId:'a' }),
          e(Bar, { dataKey:'edenred', name:'Edenred', fill:'#f59e0b', radius:[3,3,0,0], stackId:'a' })
        )
      )
    ),

    // Top merchants
    active==='merchants' && e('div', { className:'fu', style:card({ marginBottom:8 }) },
      e('p', { style:{ fontSize:12, color:'var(--text3)', marginBottom:16, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.06em' } }, 'Top comercianți'),
      topMch.length>0 ? e(ResponsiveContainer, { width:'100%', height:260 },
        e(BarChart, { data:topMch, layout:'vertical' },
          e(CartesianGrid, { strokeDasharray:'3 3', stroke:'var(--border)', horizontal:false }),
          e(XAxis, { type:'number', tick:{ fill:'var(--text3)', fontSize:10 }, axisLine:false, tickLine:false }),
          e(YAxis, { type:'category', dataKey:'name', tick:{ fill:'var(--text2)', fontSize:11 }, axisLine:false, tickLine:false, width:85 }),
          e(Tooltip, { content: e(CTip) }),
          e(Bar, { dataKey:'total', name:'Total', fill:'#a594ff', radius:[0,6,6,0] })
        )
      ) : e('p', { style:{ color:'var(--text3)', textAlign:'center', padding:30 } }, 'Nicio dată')
    )
  );
}

// ── SETTINGS ──────────────────────────────────────────────────────────────
function Settings({ settings, onSave, onImport, count }) {
  const [url, setUrl] = useState(settings.supabaseUrl||'');
  const [key, setKey] = useState(settings.supabaseKey||'');
  const [st, setSt] = useState(null);
  const [loading, setLoading] = useState(false);

  async function connect() {
    setLoading(true); setSt(null);
    try {
      const r = await fetch(`${url}/rest/v1/transactions?limit=1`, { headers:{ 'apikey':key, 'Authorization':`Bearer ${key}` } });
      if (r.ok || r.status===400) { setSt('ok'); onSave({ supabaseUrl:url, supabaseKey:key, useSupabase:true }); }
      else setSt('error');
    } catch { setSt('error'); }
    setLoading(false);
  }

  const row = (label, content) => e('div', { style:{ marginBottom:16 } },
    e('label', { style:{ display:'block', fontSize:13, color:'var(--text2)', marginBottom:6 } }, label),
    content
  );
  const inp = (val, onChange, placeholder, type='text') => e('input', { value:val, onChange, placeholder, type,
    style:{ width:'100%', padding:12, background:'var(--bg3)', border:'1px solid var(--border)', borderRadius:10, color:'var(--text)', fontSize:14, outline:'none', colorScheme:'dark' } });

  return e('div', { style:{ flex:1, overflowY:'auto', padding:'16px 16px 8px', WebkitOverflowScrolling:'touch' } },
    e('h2', { className:'fu', style:{ fontFamily:'DM Serif Display, serif', fontSize:28, fontWeight:400, marginBottom:20 } }, 'Setări'),

    // Status
    e('div', { className:'fu fu1', style:card({ marginBottom:16 }) },
      e('p', { style:{ fontSize:12, color:'var(--text3)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:12 } }, 'Stocare'),
      e('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center' } },
        e('div', null,
          e('p', { style:{ fontSize:16, fontWeight:600 } }, count + ' tranzacții'),
          e('p', { style:{ fontSize:13, color:'var(--text3)', marginTop:3 } }, settings.useSupabase ? '☁️ Supabase activ' : '📱 Stocare locală')
        ),
        e('span', { style:{ background:(settings.useSupabase?'#4ade80':'#fbbf24')+'22', color:settings.useSupabase?'#4ade80':'#fbbf24', border:`1px solid ${settings.useSupabase?'#4ade80':'#fbbf24'}44`, borderRadius:6, padding:'3px 10px', fontSize:13, fontWeight:500 } }, settings.useSupabase?'Cloud':'Local')
      )
    ),

    // Supabase
    e('div', { className:'fu fu2', style:card({ marginBottom:16 }) },
      e('p', { style:{ fontSize:12, color:'var(--text3)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:8 } }, 'Conectare Supabase'),
      e('p', { style:{ fontSize:13, color:'var(--text3)', marginBottom:16, lineHeight:1.6 } }, 'Opțional — backup în cloud, acces de pe orice dispozitiv. Crează cont gratuit pe supabase.com'),
      row('URL Proiect', inp(url, ev=>setUrl(ev.target.value), 'https://xxxx.supabase.co')),
      row('Cheie Anon', inp(key, ev=>setKey(ev.target.value), 'eyJhbGci...', 'password')),
      e('button', { onClick:connect, disabled:loading||!url||!key, style:{ width:'100%', padding:13, background:'var(--accent)', border:'none', borderRadius:12, color:'white', fontSize:15, fontWeight:600, cursor:(!url||!key)?'default':'pointer', opacity:(!url||!key)?0.5:1 } },
        loading ? 'Se verifică...' : 'Conectează Supabase'
      ),
      st==='ok' && e('p', { style:{ color:'var(--green)', fontSize:13, marginTop:10, textAlign:'center' } }, '✓ Conectat cu succes!'),
      st==='error' && e('p', { style:{ color:'var(--red)', fontSize:13, marginTop:10, textAlign:'center' } }, '✕ Eroare — verifică URL și cheie')
    ),

    // Import manual
    e('div', { className:'fu fu3', style:card({ marginBottom:16 }) },
      e('p', { style:{ fontSize:12, color:'var(--text3)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:12 } }, 'Adaugă din notificare'),
      ...Object.entries(PARSERS).map(([src,p]) =>
        e('button', { key:src, onClick:()=>onImport(src), style:{ width:'100%', padding:'12px 16px', background:p.color+'15', border:`1px solid ${p.color}33`, borderRadius:10, color:p.color, fontSize:14, fontWeight:500, cursor:'pointer', marginBottom:8, textAlign:'left' } },
          'Parsează notificare ' + p.name
        )
      )
    ),

    // Shortcuts guide
    e('div', { className:'fu fu4', style:card({ marginBottom:8 }) },
      e('p', { style:{ fontSize:12, color:'var(--text3)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:14 } }, 'Automatizare cu Shortcuts'),
      ...[
        'Deschide aplicația Shortcuts pe iPhone',
        'Apasă Automatizare → + (dreapta sus)',
        'Creați automatizare personală → Aplicație',
        'Selectează Revolut (sau BRD / Edenred)',
        'Bifează Se deschide → Următorul',
        'Adaugă acțiunea URL → completează cu adresa aplicației',
        'Dezactivează Întreabă înainte de rulare → Terminat',
      ].map((text, i) => e('div', { key:i, style:{ display:'flex', gap:12, alignItems:'flex-start', marginBottom:12 } },
        e('div', { style:{ width:24, height:24, borderRadius:7, background:'var(--accent-glow)', border:'1px solid var(--accent)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, color:'var(--accent2)', flexShrink:0, fontWeight:700 } }, i+1),
        e('p', { style:{ fontSize:14, color:'var(--text2)', lineHeight:1.55, marginTop:3 } }, text)
      ))
    )
  );
}

// ── ADD MODAL ─────────────────────────────────────────────────────────────
function AddModal({ onClose, onAdd, defaultSrc }) {
  const [mode, setMode] = useState('manual');
  const [src, setSrc] = useState(defaultSrc||'revolut');
  const [notif, setNotif] = useState('');
  const [amount, setAmount] = useState('');
  const [merchant, setMerchant] = useState('');
  const [category, setCategory] = useState('Altele');
  const [date, setDate] = useState(new Date().toISOString().slice(0,10));

  function doParse() {
    const p = parseNotif(notif, src);
    if (p) { setAmount(String(p.amount)); setMerchant(p.merchant); setCategory(p.category); }
  }

  function doAdd() {
    if (!amount || isNaN(parseFloat(amount))) return;
    const sp = PARSERS[src];
    onAdd({ id:Date.now().toString(), amount:parseFloat(amount), merchant:merchant||'Necunoscut', category, source:src, sourceName:sp?.name||src, sourceColor:sp?.color||'#9896b8', date:new Date(date).toISOString() });
    onClose();
  }

  const inp = (val, onChange, placeholder, type='text', extra={}) => e('input', { value:val, onChange, placeholder, type,
    style:{ width:'100%', padding:12, background:'var(--bg3)', border:'1px solid var(--border)', borderRadius:10, color:'var(--text)', fontSize:type==='number'?18:15, fontWeight:type==='number'?600:400, outline:'none', colorScheme:'dark', ...extra } });

  return e('div', { onClick:ev=>ev.target===ev.currentTarget&&onClose(), style:{ position:'fixed', inset:0, background:'rgba(0,0,0,0.75)', zIndex:100, display:'flex', alignItems:'flex-end', animation:'fadeIn 0.2s' } },
    e('div', { style:{ width:'100%', background:'var(--bg2)', borderRadius:'24px 24px 0 0', padding:`24px 20px max(24px, env(safe-area-inset-bottom))`, animation:'slideUp 0.25s ease', maxHeight:'92vh', overflowY:'auto', WebkitOverflowScrolling:'touch' } },

      e('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 } },
        e('h3', { style:{ fontFamily:'DM Serif Display, serif', fontSize:22, fontWeight:400 } }, 'Adaugă tranzacție'),
        e('button', { onClick:onClose, style:{ background:'var(--bg3)', border:'none', borderRadius:8, width:32, height:32, cursor:'pointer', color:'var(--text2)', fontSize:20 } }, '×')
      ),

      // Mode toggle
      e('div', { style:{ display:'flex', background:'var(--bg3)', borderRadius:10, padding:3, marginBottom:20 } },
        ...[['manual','Manual'],['notif','Din notificare']].map(([id,label]) =>
          e('button', { key:id, onClick:()=>setMode(id), style:{ flex:1, padding:8, borderRadius:8, border:'none', background:mode===id?'var(--bg4)':'transparent', color:mode===id?'var(--text)':'var(--text3)', fontSize:14, fontWeight:500, cursor:'pointer' } }, label)
        )
      ),

      // Source
      e('label', { style:{ display:'block', fontSize:13, color:'var(--text2)', marginBottom:6 } }, 'Sursă'),
      e('div', { style:{ display:'flex', gap:8, marginBottom:16 } },
        ...Object.entries(PARSERS).map(([s,p]) =>
          e('button', { key:s, onClick:()=>setSrc(s), style:{ flex:1, padding:10, borderRadius:10, border:'1px solid', borderColor:src===s?p.color:'var(--border)', background:src===s?p.color+'22':'transparent', color:src===s?p.color:'var(--text3)', fontSize:13, fontWeight:500, cursor:'pointer' } }, p.name)
        )
      ),

      // Notif text
      mode==='notif' && e('div', null,
        e('label', { style:{ display:'block', fontSize:13, color:'var(--text2)', marginBottom:6 } }, 'Text notificare'),
        e('textarea', { value:notif, onChange:ev=>setNotif(ev.target.value), placeholder:`Copiază textul notificării de la ${PARSERS[src]?.name}...`,
          style:{ width:'100%', height:90, padding:12, background:'var(--bg3)', border:'1px solid var(--border)', borderRadius:10, color:'var(--text)', fontSize:14, resize:'none', outline:'none', marginBottom:10 } }),
        e('button', { onClick:doParse, style:{ width:'100%', padding:11, background:'var(--bg3)', border:'1px solid var(--border)', borderRadius:10, color:'var(--text2)', fontSize:14, fontWeight:500, cursor:'pointer', marginBottom:16 } }, 'Parsează notificarea')
      ),

      // Amount
      e('label', { style:{ display:'block', fontSize:13, color:'var(--text2)', marginBottom:6 } }, 'Sumă (RON)'),
      e('div', { style:{ marginBottom:14 } }, inp(amount, ev=>setAmount(ev.target.value), '0.00', 'number')),

      // Merchant
      e('label', { style:{ display:'block', fontSize:13, color:'var(--text2)', marginBottom:6 } }, 'Comerciant'),
      e('div', { style:{ marginBottom:14 } }, inp(merchant, ev=>{ setMerchant(ev.target.value); setCategory(detectCat(ev.target.value)); }, 'ex: Mega Image')),

      // Category
      e('label', { style:{ display:'block', fontSize:13, color:'var(--text2)', marginBottom:6 } }, 'Categorie'),
      e('div', { style:{ display:'flex', flexWrap:'wrap', gap:8, marginBottom:14 } },
        ...Object.entries(CATS).map(([cat,{icon,color}]) =>
          e('button', { key:cat, onClick:()=>setCategory(cat), style:{ padding:'7px 12px', borderRadius:20, border:'1px solid', borderColor:category===cat?color:'var(--border)', background:category===cat?color+'22':'transparent', color:category===cat?color:'var(--text3)', fontSize:13, cursor:'pointer' } }, icon+' '+cat)
        )
      ),

      // Date
      e('label', { style:{ display:'block', fontSize:13, color:'var(--text2)', marginBottom:6 } }, 'Data'),
      e('div', { style:{ marginBottom:20 } }, inp(date, ev=>setDate(ev.target.value), '', 'date')),

      e('button', { onClick:doAdd, disabled:!amount, style:{ width:'100%', padding:15, background:'var(--accent)', border:'none', borderRadius:14, color:'white', fontSize:16, fontWeight:600, cursor:amount?'pointer':'default', opacity:amount?1:0.5 } }, 'Salvează tranzacția')
    )
  );
}

// ── APP ───────────────────────────────────────────────────────────────────
function App() {
  const [data, setData] = useState(load);
  const [page, setPage] = useState('dashboard');
  const [showAdd, setShowAdd] = useState(false);
  const [addSrc, setAddSrc] = useState('revolut');
  const [toast, setToast] = useState(null);
  const { transactions:txs, settings } = data;

  function upd(d) { setData(d); save(d); }
  function addTx(tx) { upd({ ...data, transactions:[tx,...txs] }); setToast({ message:`${fmt(tx.amount)} RON salvat!`, type:'success' }); }
  function delTx(id) { upd({ ...data, transactions:txs.filter(t=>t.id!==id) }); setToast({ message:'Tranzacție ștearsă', type:'success' }); }
  function saveSettings(s) { upd({ ...data, settings:{ ...settings, ...s } }); }
  function handleImport(src) { setAddSrc(src); setShowAdd(true); }

  return e('div', { style:{ height:'100%', display:'flex', flexDirection:'column', overflow:'hidden', paddingTop:'env(safe-area-inset-top)' } },
    e('div', { style:{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' } },
      page==='dashboard'    && e(Dashboard, { txs, onAdd:()=>setShowAdd(true) }),
      page==='transactions' && e(Transactions, { txs, onDelete:delTx }),
      page==='charts'       && e(Charts, { txs }),
      page==='settings'     && e(Settings, { settings, onSave:saveSettings, onImport:handleImport, count:txs.length }),
    ),
    e(Navbar, { page, setPage }),
    showAdd && e(AddModal, { onClose:()=>setShowAdd(false), onAdd:addTx, defaultSrc:addSrc }),
    toast && e(Toast, { message:toast.message, type:toast.type, onClose:()=>setToast(null) })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
